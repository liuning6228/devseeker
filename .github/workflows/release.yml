name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  NODE_VERSION: 22

jobs:
  # ─── Linux x64 + arm64 ───
  release-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux-x64, linux-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache offline BERT model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/
          key: models-${{ hashFiles('scripts/download-model.mjs') }}

      - run: npm ci
        env:
          ONNXRUNTIME_NODE_DOWNLOAD_DISABLED: 1

      - if: steps.cache-model.outputs.cache-hit != 'true'
        run: npm run download-model

      - run: npm run build

      - name: Package ${{ matrix.target }}
        run: node scripts/vsce-package.mjs ${{ matrix.target }}

      - name: Verify VSIX
        run: |
          VSIX=$(ls devseeker-*${{ matrix.target }}.vsix 2>/dev/null | head -1)
          SIZE=$(stat --format=%s "$VSIX")
          SIZE_MB=$((SIZE / 1048576))
          echo "VSIX: $VSIX  ($SIZE_MB MB)"
          ONNX_COUNT=$(unzip -l "$VSIX" 2>/dev/null | grep -c '\.onnx$' || true)
          echo "ONNX models: $ONNX_COUNT"
          if [ "$ONNX_COUNT" -eq 0 ]; then
            echo "::error::VSIX missing ONNX models!"
            exit 1
          fi
          if [ "$SIZE_MB" -lt 100 ]; then
            echo "::warning::VSIX size $SIZE_MB MB seems too small (expected ~168 MB)"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: 'devseeker-*${{ matrix.target }}.vsix'

  # ─── Windows x64 ───
  release-win32:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache offline BERT model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/
          key: models-${{ hashFiles('scripts/download-model.mjs') }}

      - run: npm ci
        env:
          ONNXRUNTIME_NODE_DOWNLOAD_DISABLED: 1

      - if: steps.cache-model.outputs.cache-hit != 'true'
        run: npm run download-model

      - run: npm run build

      - name: Package win32-x64
        run: node scripts/vsce-package.mjs win32-x64

      - name: Verify VSIX
        shell: bash
        run: |
          VSIX=$(ls devseeker-*win32-x64.vsix 2>/dev/null | head -1)
          SIZE=$(stat --format=%s "$VSIX" 2>/dev/null || stat -f%z "$VSIX" 2>/dev/null)
          SIZE_MB=$((SIZE / 1048576))
          echo "VSIX: $VSIX  ($SIZE_MB MB)"
          ONNX_COUNT=$(unzip -l "$VSIX" 2>/dev/null | grep -c '\.onnx$' || true)
          echo "ONNX models: $ONNX_COUNT"
          if [ "$ONNX_COUNT" -eq 0 ]; then
            echo "::error::VSIX missing ONNX models!"
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: 'devseeker-*win32-x64.vsix'

  # ─── macOS x64 + arm64 ───
  release-darwin-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache offline BERT model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/
          key: models-${{ hashFiles('scripts/download-model.mjs') }}

      - run: npm ci
        env:
          ONNXRUNTIME_NODE_DOWNLOAD_DISABLED: 1

      - if: steps.cache-model.outputs.cache-hit != 'true'
        run: npm run download-model

      - run: npm run build

      - name: Package darwin-x64
        run: node scripts/vsce-package.mjs darwin-x64

      - name: Verify VSIX
        run: |
          VSIX=$(ls devseeker-*darwin-x64.vsix 2>/dev/null | head -1)
          SIZE=$(stat -f%z "$VSIX")
          SIZE_MB=$((SIZE / 1048576))
          echo "VSIX: $VSIX  ($SIZE_MB MB)"
          ONNX_COUNT=$(unzip -l "$VSIX" 2>/dev/null | grep -c '\.onnx$' || true)
          echo "ONNX models: $ONNX_COUNT"
          if [ "$ONNX_COUNT" -eq 0 ]; then
            echo "::error::VSIX missing ONNX models!"
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: 'devseeker-*darwin-x64.vsix'

  release-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache offline BERT model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/
          key: models-${{ hashFiles('scripts/download-model.mjs') }}

      - run: npm ci
        env:
          ONNXRUNTIME_NODE_DOWNLOAD_DISABLED: 1

      - if: steps.cache-model.outputs.cache-hit != 'true'
        run: npm run download-model

      - run: npm run build

      - name: Package darwin-arm64
        run: node scripts/vsce-package.mjs darwin-arm64

      - name: Verify VSIX
        run: |
          VSIX=$(ls devseeker-*darwin-arm64.vsix 2>/dev/null | head -1)
          SIZE=$(stat -f%z "$VSIX")
          SIZE_MB=$((SIZE / 1048576))
          echo "VSIX: $VSIX  ($SIZE_MB MB)"
          ONNX_COUNT=$(unzip -l "$VSIX" 2>/dev/null | grep -c '\.onnx$' || true)
          echo "ONNX models: $ONNX_COUNT"
          if [ "$ONNX_COUNT" -eq 0 ]; then
            echo "::error::VSIX missing ONNX models!"
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: 'devseeker-*darwin-arm64.vsix'
