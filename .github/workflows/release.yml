name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Package VSIX
        run: node scripts/vsce-package.mjs

      - uses: softprops/action-gh-release@v2
        with:
          files: 'dualmind-*.vsix'
