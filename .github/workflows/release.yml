name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build extension + webview
        run: npm run build

      - name: Package VSIX (Linux + Windows)
        run: node scripts/vsce-package.mjs

      - uses: softprops/action-gh-release@v2
        with:
          files: 'devseeker-*.vsix'

      - name: Upload VSIX to GitCode Release
        continue-on-error: true
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          if [ -z "$GITCODE_TOKEN" ]; then
            echo "GITCODE_TOKEN not set, skipping GitCode upload"
            exit 0
          fi
          TAG_NAME="${GITHUB_REF_NAME}"
          # 用 GitCode Web API 创建 release（GitLab API 被 WAF 拦截）
          curl -s -X POST \
            "https://gitcode.com/api/v1/repos/a6228/dualmind/releases" \
            -H "Authorization: token ${GITCODE_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"tag_name\":\"${TAG_NAME}\",\"name\":\"${TAG_NAME}\",\"body\":\"Release ${TAG_NAME}\"}" > /tmp/gitcode_release.json
          # 尝试解析 response
          RELEASE_ID=""
          if command -v python3 &>/dev/null; then
            RELEASE_ID=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id','') or d.get('release_id',''))" < /tmp/gitcode_release.json 2>/dev/null || echo "")
          fi
          if [ -n "$RELEASE_ID" ]; then
            for VSIX_FILE in devseeker-*.vsix; do
              echo "Uploading ${VSIX_FILE} to GitCode..."
              curl -s -X POST \
                "https://gitcode.com/api/v1/repos/a6228/dualmind/releases/${RELEASE_ID}/assets" \
                -H "Authorization: token ${GITCODE_TOKEN}" \
                -F "attachment=@${VSIX_FILE}"
            done
            echo "Uploaded all VSIX to GitCode release ${RELEASE_ID}"
          else
            echo "GitCode release creation may have failed — need manual upload"
            cat /tmp/gitcode_release.json | head -10
          fi
