name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Package VSIX
        run: node scripts/vsce-package.mjs

      - uses: softprops/action-gh-release@v2
        with:
          files: 'dualmind-*.vsix'

      - name: Upload VSIX to GitCode Release
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          GITCODE_TOKEN="${{ secrets.GITCODE_TOKEN }}"
          curl -s -X POST \
            "https://gitcode.com/api/v1/repos/a6228/dualmind/releases" \
            -H "Authorization: token ${GITCODE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG_NAME}\",\"name\":\"${TAG_NAME}\",\"body\":\"Release ${TAG_NAME}\"}" > /tmp/gitcode_release.json
          RELEASE_ID=$(cat /tmp/gitcode_release.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          if [ -n "$RELEASE_ID" ]; then
            for VSIX_FILE in dualmind-*.vsix; do
              echo "Uploading ${VSIX_FILE} to GitCode..."
              curl -s -X POST \
                "https://gitcode.com/api/v1/repos/a6228/dualmind/releases/${RELEASE_ID}/assets" \
                -H "Authorization: token ${GITCODE_TOKEN}" \
                -F "attachment=@${VSIX_FILE}"
            done
            echo "Uploaded all VSIX to GitCode release ${RELEASE_ID}"
          else
            echo "GitCode release creation may have failed, check /tmp/gitcode_release.json"
            cat /tmp/gitcode_release.json
          fi
